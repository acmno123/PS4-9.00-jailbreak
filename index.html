<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>PS4 Jailbreak</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            background-color: #030508; 
            color: #00ff66; 
            font-family: 'Consolas', 'Courier New', monospace; 
            margin: 0; 
            padding: 30px; 
            overflow-x: hidden;
            position: relative;
        }

        #matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            opacity: 0.12;
        }

        .main-frame {
            max-width: 1100px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        h1 { 
            font-size: 38px; 
            margin: 0;
            text-shadow: 0 0 8px #00ff66, 0 0 15px #005511;
            letter-spacing: 3px;
            display: inline-block;
        }

        .system-badge {
            background: #ff0055;
            color: #000;
            font-weight: bold;
            font-size: 11px;
            padding: 2px 6px;
            vertical-align: super;
            margin-left: 10px;
            box-shadow: 0 0 8px #ff0055;
        }
        
        .subtitle { 
            color: #8899a6; 
            font-size: 13px;
            letter-spacing: 2px;
            margin: 8px 0 25px 0;
        }

        .terminal-box {
            background-color: rgba(5, 8, 12, 0.9);
            border: 1px solid #00ff66;
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.2);
            padding: 15px;
            border-radius: 4px;
            height: 150px;
            overflow-y: auto;
            font-size: 13px;
            margin-bottom: 25px;
            border-left: 4px solid #00ff66;
        }
        .terminal-line { margin: 3px 0; line-height: 1.4; }
        .t-info { color: #8899a6; }
        .t-success { color: #00ff66; font-weight: bold; text-shadow: 0 0 5px #00ff66; }
        .t-alert { color: #ff0055; font-weight: bold; text-shadow: 0 0 5px #ff0055; }
        .t-warn { color: #ffcc00; }
        
        .category-group {
            background: rgba(16, 22, 32, 0.6);
            border: 1px solid #1a2436;
            border-radius: 4px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .category-title { 
            color: #ffffff; 
            text-align: left; 
            font-size: 14px; 
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
        }
        .category-title::before {
            content: "::";
            color: #ff0055;
            margin-right: 8px;
        }
        
        .menu-container { 
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 12px;
        }
        
        .btn { 
            background: #0d1117;
            border: 1px solid #00ff66; 
            color: #00ff66; 
            padding: 14px; 
            font-size: 13px; 
            font-family: inherit;
            cursor: pointer; 
            border-radius: 3px; 
            transition: all 0.2s ease;
            text-align: center;
            font-weight: bold;
        }
        
        .btn:hover { 
            color: #000000;
            background: #00ff66;
            box-shadow: 0 0 15px #00ff66;
            transform: scale(1.02);
        }

        /* 遊戲模組按鈕專屬特殊樣式 */
        .btn-mod {
            border: 1px solid #ffcc00;
            color: #ffcc00;
        }
        .btn-mod:hover {
            background: #ffcc00;
            color: #000;
            box-shadow: 0 0 15px #ffcc00;
        }

        #status-bar { 
            margin-top: 20px;
            padding: 10px;
            background: #05080c;
            border-top: 1px solid #1a2436;
            font-size: 12px;
            color: #8899a6;
            display: flex;
            justify-content: space-between;
        }
        .status-active { color: #00ff66; font-weight: bold; }
    </style>
    <script src="exploit.js"></script>
</head>
<body>

        <div class="terminal-box" id="terminal">

    <script>
        // --- 數位雨動畫 ---
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();
        const alphabet = "0101010101ABCDEFGHIJKLMNOPQRSTUVWXYZ#@$%&*+-<>//";
        const fontSize = 14; const columns = canvas.width / fontSize;
        const rainDrops = Array.from({ length: columns }).fill(1);
        function drawMatrix() {
            ctx.fillStyle = 'rgba(3, 5, 8, 0.05)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00ff66'; ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < rainDrops.length; i++) {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);
                if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) rainDrops[i] = 0;
                rainDrops[i]++;
            }
        }
        setInterval(drawMatrix, 30);

        // --- 核心注入引擎 ---
        function printLog(text, mode = 'info') {
            const term = document.getElementById('terminal');
            const line = document.createElement('div');
            line.className = `terminal-line t-${mode}`;
            line.innerText = `[${new Date().toLocaleTimeString()}] ${text}`;
            term.appendChild(line);
            term.scrollTop = term.scrollHeight;
        }

        function executeExploit(binFile, displayName) {
            const statusLabel = document.getElementById('current-status');
            statusLabel.innerText = "RUNNING_EXPLOIT";
            statusLabel.style.color = "#ff0055";
            
            printLog(`引導核心注入序列... 目標功能: ${displayName}`, 'info');

            run_webkit_exploit().then(() => {
                statusLabel.innerText = "AWAITING_USB";
                statusLabel.style.color = "#ffcc00";
                printLog("WebKit 破防成功！等待 exfathax 漏洞隨身碟觸發...", 'success');

                setTimeout(() => {
                    printLog(`正在從雲端載入 payloads/${binFile} ...`, 'warn');
                    
                    fetch(`payloads/${binFile}`)
                        .then(res => {
                            if (!res.ok) throw new Error("找不到對應的 bin 檔案");
                            return res.arrayBuffer();
                        })
                        .then(buffer => {
                            printLog(`Payload 緩衝區下載完成。啟動核心底層寫入...`, 'info');
                            
                            if (typeof pOOBS4_inject === 'function') {
                                pOOBS4_inject(buffer);
                                printLog(`[SUCCESS] ${displayName} 已順利加載至 PS4！`, 'success');
                                statusLabel.innerText = "SYS_COMPLETE";
                                statusLabel.style.color = "#00ff66";
                            } else {
                                printLog("核心注入模組丟失，請確認 exploit.js 設定。", 'alert');
                            }
                        })
                        .catch(err => {
                            printLog(`加載失敗: ${err.message}，請確認 payloads/ 目錄內是否有該檔案。`, 'alert');
                        });
                }, 1000); 

            }).catch(err => {
                printLog("WebKit 激發失敗，請重整網頁再試一次。", 'alert');
                statusLabel.innerText = "SYS_ERROR";
            });
        }
    </script>
